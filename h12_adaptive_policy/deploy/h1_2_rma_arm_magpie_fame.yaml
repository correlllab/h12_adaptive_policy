policy_path: "../../data/rma_hand/policy.pt"
encoder_path: "../../data/rma_hand/encoder_3999.pt"
xml_path: "../../h1_2/h1_2_magpie_fame.xml"

# Keep RL policy interfaces fixed at H12 motor dimensions.
policy_num_joints: 27
h12_ctrl_count: 27

# Simulation parameters
simulation_duration: 60.0
simulation_dt: 0.002
control_decimation: 10

# PD gains legs
kps: [200, 200, 200, 300, 60, 40,
     200, 200, 200, 300, 60, 40]

kds: [5.0, 5.0, 5.0, 7.5, 1.0, 0.3,
     5.0, 5.0, 5.0, 7.5, 1.0, 0.3]

# PD gains arms
kps_arms: [500, 500, 500, 500, 500, 500, 500.0,
          500.0,
          500, 500, 500, 500, 500, 500, 500.0]

kds_arms: [5.0, 5.0, 5.0, 7.5, 1.0, 0.3, 0.0,
          0.0,
     5.0, 5.0, 5.0, 7.5, 1.0, 0.3, 0.0]

# Default joint angles for legs
default_angles: [-0.16, 0.0, 0.0, 0.36, -0.2, 0.0,
                 -0.16, 0.0, 0.0, 0.36, -0.2, 0.0]

default_angles_arms: [0.0,
                      -0.9, 0.0, 0.0, 0.5, 0.0, 0.0, 0.0,
                      -0.9, 0.0, 0.0, 0.5, 0.0, 0.0, 0.0]

